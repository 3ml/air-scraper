version: '3.8'

services:
  scraper:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ../src:/app/src
      - ../data:/app/data
      - scraper-browsers:/root/.cache/ms-playwright
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_PATH=/app/data/dev.db
      - AUTH_TOKEN=dev-token
      - SCRAPER_SECRET=dev-secret
      - CALLBACK_URL=http://host.docker.internal:3100/callback
      - ALERT_WEBHOOK_URL=http://host.docker.internal:3100/alert
      - BROWSER_HEADLESS=true
      - BROWSER_POOL_SIZE=2
      - MAX_CONCURRENT_TASKS=3
      - LOG_LEVEL=debug
    restart: unless-stopped

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ../dashboard/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - scraper

volumes:
  scraper-browsers:
